<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title>Responsive Design Example</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            .container {
                width: 100%;
            }
            
            .column {
                float: left;
                width: 33.33%;
                padding: 20px;
            }
            
            img {
                max-width: 100%;
                height: auto;
            }
            
            @media (max-width: 600px) {
                .column {
                    width: 100%;
                    float: none;
                }
                
                body {
                    background-color: lightblue;
                }
            }
            
            @media (min-width: 601px) and (max-width: 1024px) {
                body {
                    background-color: lightgreen;
                }
            }
            
            @media (min-width: 1025px) {
                body {
                    background-color: lightcoral;
                }
            }
        </style>
    </head>
    <body>
        <h1>Responsive Design Demo</h1>
        <p>Resize your browser to see the layout change!</p>
        
        <div class="container">
            <div class="column" style="background-color: #e1f5fe;">
                <h2>Column 1</h2>
                <p>This column uses fluid grid with percentage width.</p>
                <img src="water.png" alt="Water image" />
            </div>
            <div class="column" style="background-color: #e8f5e9;">
                <h2>Column 2</h2>
                <p>This layout adapts to screen size using media queries.</p>
            </div>
            <div class="column" style="background-color: #fff3e0;">
                <h2>Column 3</h2>
                <p>On small screens, columns stack vertically.</p>
            </div>
        </div>
    </body>
</html>
